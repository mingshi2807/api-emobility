  # CSMS Administration
  /admin/add_charge_point:
    post:
      tags:
        - CSMS Administration
      summary: Add Charging Station
      operationId: addCS
      description: Add a charging station to the CSMS database
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddChargePointRequest'
            example:
              cp_id: "CP_3"
              ocpp_version: "2.0.1"
              basic_auth_password: "p@ssw0rd"
      responses:
        '201':
          description: Charging station successfully added
          content:
            text/plain:
              schema:
                type: string
              example: "Charging station ICOFI_CS201 successfully added"
        '409':
          description: Duplicate charging station identity
          content:
            text/plain:
              schema:
                type: string
              example: "Charging station ICOFI_CS201 already exists, please provide another id for the new charging station"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/delete_charge_point/{cp_id}:
    delete:
      tags:
        - CSMS Administration
      summary: Delete Charging Station
      operationId: deleteCS
      description: Delete a charging station from the CSMS database
      security:
        - BearerAuth: []
      parameters:
        - name: cp_id
          in: path
          required: true
          schema:
            type: string
          description: Charging station ID to delete
          example: "ICOFI_CS201"
      responses:
        '202':
          description: Charging station deleted successfully
          content:
            text/plain:
              schema:
                type: string
              example: "Charging station ICOFI_CS201 successfully deleted."
        '404':
          description: Charging station not found
          content:
            text/plain:
              schema:
                type: string
              example: "Charging station ICOFI_CS201 does not exist in database"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/add_user:
    post:
      tags:
        - CSMS Administration
      summary: Add user
      operationId: addUser
      description: Add a user (CPO, admin or EV user) to the CSMS users database
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCPORequest'
            example:
              username: "Mick"
              password: "$H4m0n4_"
              role: "CPO"
      responses:
        '201':
          description: User successfully added
          content:
            text/plain:
              schema:
                type: string
              example: "New user 'Mick' successfully added"
        '409':
          description: Duplicate user
          content:
            text/plain:
              schema:
                type: string
              example: "User 'Mick' already exists, please provide another username"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/delete_user/{username}:
    delete:
