openapi: 3.1.0
info:
  title: CSMS REST API
  description: |
    REST API for Charging Station Management System (CSMS) supporting OCPP 2.0.1/2.1 operations, 
    CSMS administration, and OCPI 2.2.1 functionality.
    
    **Authentication**: Most endpoints require a JWT token obtained from the login endpoint.
    OCPI endpoints use OCPI token-based authentication.
  version: 0.0.1
  contact:
    name: VEDECOM CSMS API
  license:
    name: MIT
    url: "https://spdx.org/licenses/MIT.html"
    identifier: "MIT"
    
servers:
  - url: https://csms.emobility-vedecom.org:8080
    description: CSMS Web Server (TLS)
  - url: http://csms.emobility-vedecom.org:8080
    description: CSMS Web Server (no TLS)

security:
  - BearerAuth: []
  - OCPIToken: []
  - {}

paths:
  # Authentication
  /login:
    post:
      operationId: loginUser
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and receive JWT token (expires after 2 hours)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: "XYZ_user"
              password: "azerty"
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized - Invalid credentials
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                missing_required_data:
                  summary: Missing required fields
                  value: "Missing data in JSON payload ('username' and 'password' required)"
                invalid_data_type_username:
                  summary: Invalid username type
                  value: "'username' must be a string"
                invalid_data_type_password:
                  summary: Invalid password type
                  value: "'password' must be a string"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '500':
          $ref: '#/components/responses/InternalError'

  # OCPP Actions
  /ocpp/{station_id}/set_variables:
    post:
      tags:
        - OCPP Actions
      summary: Set Variables
      operationId: setVariables
      description: Change one or several configuration variables of the charging station
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SetVariablesRequest'
            example:
              - component:
                  name: "OCPPCommCtrlr"
                variable:
                  name: "HeartbeatInterval"
                attribute_value: "45"
      responses:
        '200':
          description: Charging Station response for SetVariablesRequest
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SetVariablesResponse'
              example:
                - component:
                    name: "OCPPCommCtrlr"
                  variable:
                    name: "HeartbeatInterval"
                  attribute_status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/get_variables:
    post:
      tags:
        - OCPP Actions
      summary: Get Variables
      operationId: getVariables
      description: Retrieve one or several configuration variables of the charging station
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/GetVariablesRequest'
            example:
              - component:
                  name: "SecurityCtrlr"
                variable:
                  name: "SecurityProfile"
      responses:
        '200':
          description: Charging Station response for GetVariablesRequest
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetVariablesResponse'
              example:
                - component:
                    name: "SecurityCtrlr"
                  variable:
                    name: "SecurityProfile"
                  attribute_status: "Accepted"
                  attribute_value: "3"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/trigger_message:
    post:
      tags:
        - OCPP Actions
      summary: Trigger Message
      operationId: triggerMessage
      description: Force the charging station to perform a specific OCPP function
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerMessageRequest'
            example:
              requested_message: "SignV2GCertificate"
      responses:
        '200':
          description: Charging Station response for TriggerMessageRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerMessageResponse'
              example:
                status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/request_start_transaction:
    post:
      tags:
        - OCPP Actions
      summary: Remote Start Transaction
      operationId: requestStartTransaction
      description: Request a charging station to start a transaction
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestStartTransactionRequest'
            example:
              id_token:
                id_token: "0000-0000-0001"
                type: "Central"
              remote_start_id: 12345
      responses:
        '200':
          description: Charging Station response for RequestStartTransactionRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestStartTransactionResponse'
              example:
                status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/request_stop_transaction:
    post:
      tags:
        - OCPP Actions
      summary: Remote Stop Transaction
      operationId: requestStopTransaction
      description: Request a charging station to stop a transaction
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestStopTransactionRequest'
            example:
              transaction_id: "azerty-1234-poiuyt-9876"
      responses:
        '200':
          description: Charging Station response for RequestStartTransactionRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestStopTransactionResponse'
              example:
                status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/get_base_report/{report_type}:
    get:
      tags:
        - OCPP Actions
      summary: Get Base Report
      operationId: getBaseReport
      description: Request a charging station to send a predefined report
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
        - name: report_type
          in: path
          required: true
          schema:
            type: string
            enum: [FullInventory, ConfigurationInventory, SummaryInventory]
          description: Type of report to request
      responses:
        '200':
          description: Charging Station response for GetBaseReportRequest. If accepted, the report will be send in an subsequent Action called NotifyReport
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    description: This indicates whether the Charging Station is able to accept this request
                    type: string
                    enum: [Accepted, Rejected, NotSupported, EmptyResultSet]
                  status_info:
                    $ref: '#/components/schemas/StatusInfoType' 
              example:
                status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/reset:
    post:
      tags:
        - OCPP Actions
      summary: Reset
      operationId: reset
      description: Request a charging station to reset itself
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetRequest'
            example:
              type: "OnIdle"
              evse: 1
      responses:
        '200':
          description: Charging Station response for ResetRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetResponse'
              example:
                status: "Scheduled"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/data_transfer:
    post:
      tags:
        - OCPP Actions
      summary: Data Transfer
      operationId: dataTransfer
      description: Request a charging station to perform a custom action. VEDECOM CSMS supports an `add_config` custom function to add a new Component and Variable to the Device Model
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataTransferRequest'
            example:
              vendor_id: "XYZ"
              message_id: "add_config"
              data:
                component:
                  name: "CustomCtrlr"
                variable:
                  name: "CustomVariable"
                value: "Hello OCPP !"
                read_only: "false"
      responses:
        '200':
          description: Charging Station response for DataTransferRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataTransferResponse'
              example:
                status: "Accepted"
                data:
                  component:
                    name: "CustomCtrlr"
                  variable:
                    name: "CustomVariable"
                  value: "Hello OCPP !"
                  read_only: "false"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/get_transaction_status:
    post:
      tags:
        - OCPP Actions
      summary: Get Transaction Status
      operationId: getTransactionStatus
      description: Ask the charging station about transaction-related messages waiting to be delivered
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTransactionStatusRequest'
            example:
              transaction_id: "GoejPkeo_4965"
      responses:
        '200':
          description: Charging Station response for GetTransactionStatusRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTransactionStatusResponse'
              example:
                messages_in_queue: false
                ongoing_indicator: true
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/install_ca_certificate:
    post:
      tags:
        - OCPP Actions
      summary: Install Root CA Certificate
      operationId: installCACertificate
      description: Request charging station to install a new Root CA certificate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallCertificateRequest'
            example:
              certificate_type: "V2GRootCertificate"
              certificate: "-----BEGIN CERTIFICATE-----\nMIICSjCCAdGgAwIBAgIUSAaZVMn5Vsv...[truncated for brevity]\n-----END CERTIFICATE-----"
      responses:
        '200':
          description: Charging Station response for InstallCertificateRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallCertificateResponse'
              example:
                status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/get_charging_profiles:
    post:
      tags:
        - OCPP Actions
      summary: Get Charging Profiles
      operationId: getChargingProfiles
      description: Search for installed charging profiles in a charging station. The charging profiles will then be reported by the Charging Station via ReportChargingProfilesRequest messages
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetChargingProfilesRequest'
            examples:
              by_id:
                summary: Search by charging profile ID
                value:
                  request_id: 12345
                  charging_profile:
                    charging_profile_id: [255]
              by_criteria:
                summary: Search by stack level and purpose
                value:
                  request_id: 67890
                  charging_profile:
                    charging_profile_purpose: "TxDefaultProfile"
                    stack_level: 1
      responses:
        '200':
          description: Charging Station response for GetChargingProfilesRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetChargingProfilesResponse'
              example:
                status: "NoProfiles"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/set_charging_profile:
    post:
      tags:
        - OCPP Actions
      summary: Set Charging Profile
      operationId: setChargingProfile
      description: Provide charging station with a new charging profile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetChargingProfileRequest'
            examples:
              tx_default_profile:
                summary: TxDefaultProfile example
                value:
                  evse_id: 1
                  charging_profile:
                    id: 1
                    stack_level: 1
                    charging_profile_purpose: "TxDefaultProfile"
                    charging_profile_kind: "Relative"
                    charging_schedule:
                      - id: 1
                        charging_rate_unit: "W"
                        charging_schedule_period:
                          - start_period: 0
                            limit: 2000
                          - start_period: 3600
                            limit: 5000
              max_profile:
                summary: ChargingStationMaxProfile
                value:
                  evse_id: 0
                  charging_profile:
                    id: 2
                    stack_level: 1
                    charging_profile_purpose: "ChargingStationMaxProfile"
                    charging_profile_kind: "Absolute"
                    charging_schedule:
                      - id: 301
                        start_schedule: "2025-07-14T12:00:00Z"
                        charging_rate_unit: "W"
                        charging_schedule_period:
                          - start_period: 0
                            limit: 22000
      responses:
        '200':
          description: Charging Station response for SetChargingProfileRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetChargingProfileResponse'
              example:
                status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/change_availability:
    post:
      tags:
        - OCPP Actions
      summary: Change Availability
      operationId: setAvailability
      description: Change the availability of EVSE, Connector or entire charging station
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeAvailabilityRequest'
            examples:
              entire_station:
                summary: Change availability of entire station
                value:
                  operational_status: "Operative"
              specific_evse:
                summary: Change availability of specific EVSE and connector
                value:
                  operational_status: "Inoperative"
                  evse:
                    id: 1
                    connector_id: 3
      responses:
        '200':
          description: Charging Station response for ChangeAvailabilityRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeAvailabilityResponse'
              example:
                status: "Accepted"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ChargingStationNotConnectedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/send_local_list:
    post:
      tags:
        - OCPP Actions
      summary: Send Local List
      operationId: sendLocalList
      description: Send Local Authorization List to the charging station
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendLocalListRequest'
            example:
              version_number: 12
              update_type: "Full"
              local_authorization_list:
                - id_token_info:
                    status: "Accepted"
                  id_token:
                    id_token: "ABC1234"
                    type: "ISO14443"
                - id_token_info:
                    status: "Accepted"
                  id_token:
                    id_token: "DEF4567"
                    type: "ISO14443"
      responses:
        '200':
          description: Charging Station response for SendLocalListRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendLocalListResponse'
              example:
                status: "VersionMismatch"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                ocpp_protocol_error:
                  summary: Validation error of OCPP payload (wrong type, missing property etc.)
                  value: "ProtocolError: <OCPP Error description>"
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/get_restricted_status:
    get:
      tags:
        - OCPP Actions
      summary: Get Restricted Status
      operationId: getRestrictedStatus
      description: Retrieve the restricted_status variable of a charging station. Is used to activate 'Pending' mode during BootNotification
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      responses:
        '200':
          description: Restricted status of the charging station or None if not found
          content:
            text/plain:
              schema:
                anyOf:
                  - type: boolean
                  - type: string
              examples:
                success: 
                  summary: restricted_status value successfully retrieved
                  value: "true"
                not_found: 
                  summary: restricted_status value not retrieved
                  value: "None"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/set_restricted_status:
    post:
      tags:
        - OCPP Actions
      summary: Set Restricted Status
      operationId: setRestrictedStatus
      description: Change the restricted_status variable of a charging station
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRestrictedStatusRequest'
            example:
              new_status: false
      responses:
        '200':
          description: Operation result (true of false)
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: "Charging station ICOFI_CS201 restricted status is now false"
                failure:
                  value: "Could not update restricted status of ICOFI_CS201"
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              examples:
                empty_payload:
                  summary: Empty request body
                  value: "Request body cannot be empty"
                invalid_type:
                  summary: Invalid request body
                  value: "Invalid type (awaited JSON)"
                missing_new_status:
                  summary: New status not provided
                  value: "No status provided to update the restricted status of the charging station"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'

  /ocpp/{station_id}/get_blacklisted_status:
