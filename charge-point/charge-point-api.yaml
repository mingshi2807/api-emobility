openapi: 3.1.0
info:
  title: Charge Point HTTP and WebSocket Inventory
  version: 1.0.0
  description: >-
    Inventory of the HTTP API routes and broadcast-only WebSocket notifications
    currently implemented by the charge-point codebase. The default HTTP base URL
    is `http://{host}:15108/api` and the default WebSocket base URL is
    `ws://{host}:15109`.
servers:
  - url: http://{host}:15108/api
    description: Default HTTP API base URL from `src/config/Config.cpp`
    variables:
      host:
        default: localhost
  - url: ws://{host}:15109
    description: >-
      Default WebSocket server URL from `src/config/Config.cpp`. OpenAPI does
      not model WebSocket operations natively; see `x-websocket` and endpoint
      descriptions below.
    variables:
      host:
        default: localhost
tags:
  - name: Charge
  - name: Config
  - name: System
  - name: IEC 61851
  - name: CCS
  - name: Charge Broker
  - name: EMS
security: []
x-websocket:
  baseUrl: ws://{host}:15109/
  support:
    mode: broadcast-only
    description: >-
      The current implementation broadcasts notifications only. `ExternalAccessor.cpp`
      wires WebSocket broadcasters for CCS, charge-broker, and EMS notifications,
      but does not register any WebSocket request/response routes on the server.
      Clients may connect and receive broadcasts; request handling is effectively
      absent in the current charge-point build.
  outboundEnvelope:
    description: >-
      Outbound messages are generated by `src/external-accessor/core/websocket/wsresponse.cpp`
      and contain `uri`, `status`, and `data`. Older docs/examples may show an
      `action` field, but the current implementation does not emit it.
    schema:
      $ref: '#/components/schemas/WsNotificationEnvelope'
  notifications:
    - uri: /broker/meter/power
      payload:
        $ref: './evse-charge-broker-api.yaml#/components/schemas/power'
    - uri: /broker/meter/current
      payload:
        $ref: './evse-charge-broker-api.yaml#/components/schemas/current'
    - uri: /broker/meter/voltage
      payload:
        $ref: './evse-charge-broker-api.yaml#/components/schemas/voltage'
    - uri: /broker/charge-limits
      payload:
        $ref: './evse-charge-broker-api.yaml#/components/schemas/charge-limits'
    - uri: /broker/discharge-limits
      payload:
        $ref: './evse-charge-broker-api.yaml#/components/schemas/discharge-limits'
    - uri: /broker/transaction
      payload:
        $ref: './evse-charge-broker-api.yaml#/components/schemas/transaction'
    - uri: ccs/state
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/ComboCSState'
    - uri: ccs/settings
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/ComboCSSettings'
    - uri: ccs/security-settings
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/ComboCSSecuritySettings'
    - uri: ccs/ev/charge-settings
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/EvChargeSettings'
    - uri: /ccs/ev/power-schedule
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/PowerSchedule'
    - uri: ccs/ev/ac-charge-params
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/EvAcChargeParams'
    - uri: ccs/ev/dc-charge-params
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/EvDcChargeParams'
    - uri: ccs/evse/charge-settings
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/EvseChargeSettings'
    - uri: ccs/evse/sa-schedules
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/SaSchedules'
    - uri: ccs/evse/ac-charge-params
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/EvseAcChargeParams'
    - uri: ccs/evse/dc-charge-params
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/EvseDcChargeParams'
    - uri: ccs/evse/meter-info
      payload:
        $ref: './evse-combocs-api.yaml#/components/schemas/MeterInfo'
    - uri: /ems/grid
      payload:
        $ref: '#/components/schemas/EmsGridNotification'
    - uri: /broker/meter/power
      payload:
        $ref: './evse-ems-api.yaml#/components/schemas/PowerScheduleType'
      note: >-
        Implementation quirk: `EvseEmsWsCtrl.cpp` emits EMS composite-schedule
        notifications on `/broker/meter/power`, likely by mistake.
paths:
  /service_renegotiation:
    $ref: '#/components/pathItems/ServiceRenegotiationUpdate'
  /renegociate:
    $ref: '#/components/pathItems/RenegotiateUpdate'
  /auth:
    $ref: '#/components/pathItems/AuthUpdate'
  /auth/whitelist:
    $ref: '#/components/pathItems/WhitelistUpdate'
  /auth/blacklist:
    $ref: '#/components/pathItems/BlacklistUpdate'
  /auth/whitelist/{tokenId}:
    delete:
      tags: [Charge]
      summary: Delete one whitelist token
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Token delete request accepted.
  /auth/blacklist/{tokenId}:
    delete:
      tags: [Charge]
      summary: Delete one blacklist token
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Token delete request accepted.
  /config:
    $ref: '#/components/pathItems/ConfigRootUpdate'
  /config/{resource}:
    $ref: '#/components/pathItems/ConfigResourceUpdate'
  /system:
    $ref: '#/components/pathItems/SystemUpdate'
  /system/reboot:
    $ref: '#/components/pathItems/SystemRebootDeprecated'
  /system/soft-reboot:
    $ref: '#/components/pathItems/SoftReboot'
  /system/hard-reboot:
    $ref: '#/components/pathItems/HardReboot'
  /system/hard-shutdown:
    $ref: '#/components/pathItems/HardShutdown'
  /system/soft-shutdown:
    $ref: '#/components/pathItems/SoftShutdown'
  /system/log/{log-name}/{log-extension}:
    get:
      tags: [System]
      summary: Download a log file
      parameters:
        - $ref: '#/components/parameters/LogName'
        - $ref: '#/components/parameters/LogExtension'
      responses:
        '200':
          description: Log file contents.
          content:
            text/plain:
              schema:
                type: string
            text/csv:
              schema:
                type: string
            application/octet-stream:
              schema:
                type: string
                format: binary
    delete:
      tags: [System]
      summary: Delete a log file
      parameters:
        - $ref: '#/components/parameters/LogName'
        - $ref: '#/components/parameters/LogExtension'
      responses:
        '200':
          description: Log file deleted.
  /iec-1:
    get:
      tags: [IEC 61851]
      summary: Get IEC 61851 status
      responses:
        '200':
          description: Current IEC 61851 values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Iec61851Status'
        '500':
          description: IEC 61851 controller is not available.
  /iec-1/pwm/{pwm}:
    $ref: '#/components/pathItems/IecPwmUpdate'
  /iec-1/pwm-state/{enable}:
    $ref: '#/components/pathItems/IecPwmStateUpdate'
  /ccs/state:
    get:
      tags: [CCS]
      summary: Get CCS state
      responses:
        '200':
          description: CCS state data.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/ComboCSState'
  /ccs/settings:
    get:
      tags: [CCS]
      summary: Get CCS settings
      responses:
        '200':
          description: CCS settings.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/ComboCSSettings'
  /ccs/security-settings:
    get:
      tags: [CCS]
      summary: Get CCS security settings
      responses:
        '200':
          description: Security settings.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/ComboCSSecuritySettings'
  /ccs/ev/charge-settings:
    get:
      tags: [CCS]
      summary: Get EV charge settings
      responses:
        '200':
          description: EV charge settings.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/EvChargeSettings'
  /ccs/ev/ac-charge-params:
    get:
      tags: [CCS]
      summary: Get EV AC charge params
      responses:
        '200':
          description: EV AC charge parameters.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/EvAcChargeParams'
  /ccs/ev/dc-charge-params:
    get:
      tags: [CCS]
      summary: Get EV DC charge params
      responses:
        '200':
          description: EV DC charge parameters.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/EvDcChargeParams'
  /ccs/ev/power-schedule:
    get:
      tags: [CCS]
      summary: Get EV power schedule
      responses:
        '200':
          description: EV power schedule.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/PowerSchedule'
        '204':
          description: No EV power schedule available.
  /ccs/evse/charge-settings:
    get:
      tags: [CCS]
      summary: Get EVSE charge settings
      responses:
        '200':
          description: EVSE charge settings.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/EvseChargeSettings'
  /ccs/evse/ac-charge-params:
    get:
      tags: [CCS]
      summary: Get EVSE AC charge params
      responses:
        '200':
          description: EVSE AC charge parameters.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/EvseAcChargeParams'
  /ccs/evse/dc-charge-params:
    get:
      tags: [CCS]
      summary: Get EVSE DC charge params
      responses:
        '200':
          description: EVSE DC charge parameters.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/EvseDcChargeParams'
  /ccs/evse/sa-schedules:
    get:
      tags: [CCS]
      summary: Get EVSE SA schedules
      responses:
        '200':
          description: Up to the first three SA schedules.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/SaSchedules'
        '204':
          description: No schedules available.
  /ccs/evse/meter-info:
    get:
      tags: [CCS]
      summary: Get EVSE meter info
      responses:
        '200':
          description: EVSE meter info.
          content:
            application/json:
              schema:
                $ref: './evse-combocs-api.yaml#/components/schemas/MeterInfo'
  /broker/meter/power:
    get:
      tags: [Charge Broker]
      summary: Get metered power
      responses:
        '200':
          description: Meter power values.
          content:
            application/json:
              schema:
                $ref: './evse-charge-broker-api.yaml#/components/schemas/power'
  /broker/meter/current:
    get:
      tags: [Charge Broker]
      summary: Get metered current
      responses:
        '200':
          description: Meter current values.
          content:
            application/json:
              schema:
                $ref: './evse-charge-broker-api.yaml#/components/schemas/current'
  /broker/meter/voltage:
    get:
      tags: [Charge Broker]
      summary: Get metered voltage
      responses:
        '200':
          description: Meter voltage values.
          content:
            application/json:
              schema:
                $ref: './evse-charge-broker-api.yaml#/components/schemas/voltage'
  /broker/charge-limits:
    get:
      tags: [Charge Broker]
      summary: Get charge limits
      responses:
        '200':
          description: Dynamic charge limits.
          content:
            application/json:
              schema:
                $ref: './evse-charge-broker-api.yaml#/components/schemas/charge-limits'
  /broker/discharge-limits:
    get:
      tags: [Charge Broker]
      summary: Get discharge limits
      description: Actual handler returns `200 OK`; some older docs said `202`.
      responses:
        '200':
          description: Dynamic discharge limits.
          content:
            application/json:
              schema:
                $ref: './evse-charge-broker-api.yaml#/components/schemas/discharge-limits'
  /broker/transaction:
    get:
      tags: [Charge Broker]
      summary: Get transaction metrics
      responses:
        '200':
          description: Transaction metrics.
          content:
            application/json:
              schema:
                $ref: './evse-charge-broker-api.yaml#/components/schemas/transaction'
  /ems/stop:
    $ref: '#/components/pathItems/EmsStop'
  /ems/charging-profile:
    $ref: '#/components/pathItems/EmsChargingProfileUpdate'
  /ems/charging-profile/{charging-profile-id}:
    delete:
      tags: [EMS]
      summary: Delete charging profile
      parameters:
        - $ref: '#/components/parameters/ChargingProfileId'
      responses:
        '202':
          description: Delete accepted.
  /ems/composite-schedule:
    get:
      tags: [EMS]
      summary: Get composite schedule
      responses:
        '200':
          description: Composite schedule.
          content:
            application/json:
              schema:
                $ref: './evse-ems-api.yaml#/components/schemas/PowerScheduleType'
  /ems/sa-schedule:
    $ref: '#/components/pathItems/EmsSaScheduleUpdate'
  /ems/sa-schedule/{sa-schedule-id}:
    delete:
      tags: [EMS]
      summary: Delete SA schedule
      description: >-
        The implementation removes by list index, not by schedule object's embedded
        `saScheduleId` value.
      parameters:
        - $ref: '#/components/parameters/SaScheduleId'
      responses:
        '202':
          description: Delete accepted.
  /ems/sa-schedules:
    get:
      tags: [EMS]
      summary: Get SA schedules
      description: Implementation currently reuses the same handler as `/ems/charging-profile`.
      responses:
        '200':
          description: Schedule list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaScheduleList'
        '204':
          description: No schedules available.
  /ems/central-sa-schedules:
    get:
      tags: [EMS]
      summary: Get central SA schedules
      responses:
        '200':
          description: Central schedules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaScheduleList'
        '204':
          description: No schedules available.
  /ems/session-schedule:
    get:
      tags: [EMS]
      summary: Get session schedule
      responses:
        '200':
          description: Session schedule.
          content:
            application/json:
              schema:
                $ref: './evse-ems-api.yaml#/components/schemas/sa-schedule'
  /ems/set-point:
    $ref: '#/components/pathItems/EmsSetPointUpdate'
  /ems/control-mode:
    get:
      tags: [EMS]
      summary: Get EMS control mode
      description: >-
        The current implementation returns a one-element JSON array, not a bare
        string.
      responses:
        '200':
          description: Control mode array.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlModeList'
  /ems/grid/up:
    $ref: '#/components/pathItems/EmsGridUp'
  /ems/grid/down:
    $ref: '#/components/pathItems/EmsGridDown'
  /ems/gcm/on:
    get:
      tags: [EMS]
      summary: Enable emergency grid control
      responses:
        '202':
          description: Emergency control enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyGridControlStatus'
  /ems/gcm/off:
    get:
      tags: [EMS]
      summary: Disable emergency grid control
      responses:
        '200':
          description: Emergency control disabled.
  /ems/gcm/lfsmo:
    $ref: '#/components/pathItems/EmsGridConstraints'
components:
  parameters:
    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
    Resource:
      name: resource
      in: path
      required: true
      schema:
        type: string
    LogName:
      name: log-name
      in: path
      required: true
      schema:
        type: string
    LogExtension:
      name: log-extension
      in: path
      required: true
      schema:
        type: string
        enum: [log, csv]
    Pwm:
      name: pwm
      in: path
      required: true
      schema:
        type: integer
    Enable:
      name: enable
      in: path
      required: true
      schema:
        oneOf:
          - type: integer
          - type: boolean
          - type: string
    ChargingProfileId:
      name: charging-profile-id
      in: path
      required: true
      schema:
        type: integer
    SaScheduleId:
      name: sa-schedule-id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    EmptyObject:
      type: object
      additionalProperties: false
    GenericConfigObject:
      type: object
      description: Conservative map-shaped config payload.
      additionalProperties: true
    IdToken:
      type: object
      properties:
        id:
          type: string
        idType:
          type: string
      required: [id, idType]
    IdTokenList:
      type: array
      items:
        $ref: '#/components/schemas/IdToken'
    AuthUpdateRequest:
      type: object
      description: >-
        Handler accepts either `token`, `state`, or both. `token` triggers an
        authorization request; `state` forces authorization state.
      properties:
        token:
          type: string
        state:
          type: string
      additionalProperties: true
    TokenList:
      type: array
      items:
        type: string
    ChargeStatus:
      type: object
      description: Conservative model of `ChargeCtrl::generateChargeResponse()`.
      properties:
        state:
          type: string
        authentication:
          type: object
          properties:
            state:
              type: string
            token:
              type: string
          additionalProperties: true
        energyManager:
          type: object
          properties:
            mode:
              type: string
            contractPowerMax:
              type: number
            dischargeEnabled:
              type: boolean
          additionalProperties: true
        charge:
          $ref: '#/components/schemas/PowerLimits'
        discharge:
          allOf:
            - $ref: '#/components/schemas/PowerLimits'
            - type: object
              properties:
                voltageMin:
                  type: number
        pwm:
          type: integer
        cp:
          type: string
        pp:
          type: number
        arrivalDate:
          type: string
          format: date-time
        plannedFinishedDate:
          type: string
          format: date-time
        departureDate:
          type: string
          format: date-time
        measuredPower:
          $ref: '#/components/schemas/MeasuredPower'
        measuredExternalPower:
          $ref: '#/components/schemas/MeasuredPower'
        chargedEnergy:
          type: number
        dischargedEnergy:
          type: number
        target:
          type: object
          properties:
            state:
              type: string
            maximumPower:
              type: number
            appliedPower:
              type: number
            nbOfPhases:
              type: integer
          additionalProperties: true
      additionalProperties: true
    PowerLimits:
      type: object
      properties:
        currentMax:
          type: number
        currentMin:
          type: number
        powerMax:
          type: number
        powerMin:
          type: number
        voltageMax:
          type: number
      additionalProperties: true
    MeasuredPower:
      type: object
      properties:
        power:
          type: number
        timestamp:
          type: string
          format: date-time
      additionalProperties: true
    SystemInfo:
      type: object
      properties:
        date:
          type: string
          format: date-time
        name:
          type: string
        version:
          type: string
        builddate:
          type: string
        behaviour:
          type: string
        httpPort:
          type: integer
        wsPort:
          type: integer
        prefix:
          type: string
      additionalProperties: true
    SystemUpdateRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
      additionalProperties: true
    Iec61851Status:
      type: object
      properties:
        pwm:
          type: integer
        cp:
          type: string
        pp:
          type: number
        measure-mode:
          type: boolean
        pwm-state:
          type: boolean
      additionalProperties: true
    EmsSetPointRequest:
      type: object
      properties:
        limit:
          type: integer
          description: Power setpoint in watts.
        source:
          type: string
      required: [limit]
      additionalProperties: true
    EmergencyGridConstraintRequest:
      type: object
      properties:
        setpoint:
          type: integer
          description: Emergency grid constraint in kW, per current implementation log message.
      required: [setpoint]
      additionalProperties: true
    EmergencyGridControlStatus:
      type: object
      properties:
        current-power:
          type: number
      additionalProperties: true
    EmsGridNotification:
      type: object
      properties:
        emergency:
          type: boolean
      required: [emergency]
    ControlModeList:
      type: array
      items:
        type: string
    WsNotificationEnvelope:
      type: object
      properties:
        uri:
          type: string
        status:
          type: integer
        data:
          description: Notification payload.
      required: [uri, status, data]
      additionalProperties: false
    SaScheduleList:
      type: array
      items:
        $ref: './evse-ems-api.yaml#/components/schemas/sa-schedule'
  pathItems:
    ServiceRenegotiationUpdate:
      post:
        tags: [Charge]
        summary: Trigger service renegotiation
        description: ACTION_UPDATE route; POST, PUT, and PATCH are all accepted.
        responses:
          '200': { description: Triggered. }
      put:
        tags: [Charge]
        summary: Trigger service renegotiation
        responses:
          '200': { description: Triggered. }
      patch:
        tags: [Charge]
        summary: Trigger service renegotiation
        responses:
          '200': { description: Triggered. }
    RenegotiateUpdate:
      post:
        tags: [Charge]
        summary: Trigger renegotiation
        description: ACTION_UPDATE route; POST, PUT, and PATCH are all accepted.
        responses:
          '200': { description: Triggered. }
      put:
        tags: [Charge]
        summary: Trigger renegotiation
        responses:
          '200': { description: Triggered. }
      patch:
        tags: [Charge]
        summary: Trigger renegotiation
        responses:
          '200': { description: Triggered. }
    AuthUpdate:
      post:
        tags: [Charge]
        summary: Update authorization state
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUpdateRequest'
        responses:
          '200':
            description: Current charge status.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ChargeStatus'
          '400':
            description: Missing both `state` and `token`.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ChargeStatus'
      put:
        tags: [Charge]
        summary: Update authorization state
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUpdateRequest'
        responses:
          '200':
            description: Current charge status.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ChargeStatus'
          '400':
            description: Missing both `state` and `token`.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ChargeStatus'
      patch:
        tags: [Charge]
        summary: Update authorization state
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUpdateRequest'
        responses:
          '200':
            description: Current charge status.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ChargeStatus'
          '400':
            description: Missing both `state` and `token`.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ChargeStatus'
      delete:
        tags: [Charge]
        summary: Reset authorization state
        description: >-
          Clears the current authorization unless a charging loop is active, in
          which case the handler returns `409 Conflict`.
        responses:
          '200':
            description: Authorization reset.
            content:
